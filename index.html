<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enviar Mensaje</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: #000000;
    color: #f2efe9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    width: 90%;
    max-width: 480px;
    text-align: center;
  }
  h1 {
    font-size: 1.3rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
    letter-spacing: 0.5px;
  }
  textarea {
    width: 100%;
    min-height: 140px;
    background: #111111;
    color: #f2efe9;
    border: 1px solid #333333;
    border-radius: 8px;
    padding: 14px;
    font-size: 1rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus {
    border-color: #c0392b;
  }
  button {
    margin-top: 1rem;
    width: 100%;
    padding: 14px;
    background: #c0392b;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }
  button:hover {
    background: #a5301f;
  }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .status {
    margin-top: 1rem;
    font-size: 0.9rem;
    min-height: 1.2rem;
  }
  .status.ok { color: #4caf50; }
  .status.error { color: #e74c3c; }
</style>
</head>
<body>

<div class="container">
  <h1>Ingrese el codigo para continuar</h1>
  <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..."></textarea>
  <button id="btnEnviar">Enviar</button>
  <div class="status" id="status"></div>
</div>

<script>
  const WORKER_URL = "https://telegram-proxy.eduardtech9.workers.dev";

  const textarea = document.getElementById("mensaje");
  const boton    = document.getElementById("btnEnviar");
  const status   = document.getElementById("status");

  boton.addEventListener("click", async () => {
    const texto = textarea.value.trim();
    if (!texto) {
      mostrarStatus("Escribe un mensaje antes de enviar.", "error");
      return;
    }

    boton.disabled = true;
    mostrarStatus("Enviando...", "");

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: texto })
      });

      const data = await res.json();

      if (data.ok) {
        mostrarStatus("Mensaje enviado ✔", "ok");
        textarea.value = "";
      } else {
        mostrarStatus("Error: " + (data.error || "no se pudo enviar"), "error");
      }
    } catch (err) {
      mostrarStatus("Error de conexión.", "error");
    } finally {
      boton.disabled = false;
    }
  });

  function mostrarStatus(msg, tipo) {
    status.textContent = msg;
    status.className = "status " + tipo;
  }
</script>

</body>
</html>
